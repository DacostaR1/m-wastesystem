<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Feedback Form</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a8754, #0f5f3c);
}

.container {
    width: 100%;
    max-width: 900px;
    margin: 40px auto;
    background: rgba(255,255,255,0.95);
    padding: 25px;
    border-radius: 14px;
}

h2 {
    text-align: center;
    color: #0a8754;
}

fieldset {
    border: 2px solid #0a8754;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 15px;
}

legend {
    font-weight: bold;
    color: #0a8754;
}

label {
    display: block;
    margin-top: 10px;
}

input[type="text"],
input[type="date"],
textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.group {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.group label {
    background: #e6f7ee;
    padding: 6px 10px;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 12px;
    background: #0a8754;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #076b42;
}

#popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    color: #0a8754;
    padding: 12px 18px;
    border-radius: 8px;
    display: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="popup"></div>

<div class="container">

<h2>Customer Feedback Form</h2>

<form id="feedbackForm">

<!-- SECTION A -->
<fieldset>
<legend>Section A: Basic Info</legend>

<label>Date</label>
<input type="date" id="collection_date">

<label>Category</label>
<div class="group">
<label><input type="radio" name="cat" value="Resident"> Resident</label>
<label><input type="radio" name="cat" value="Waste Officer"> Waste Officer</label>
<label><input type="radio" name="cat" value="Administrator"> Administrator</label>
</div>

<label>Gender</label>
<div class="group">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<label>Age Range</label>
<div class="group">
<label><input type="radio" name="age" value="18-25"> 18–25</label>
<label><input type="radio" name="age" value="26-35"> 26–35</label>
<label><input type="radio" name="age" value="36-45"> 36–45</label>
<label><input type="radio" name="age" value="46+"> 46+</label>
</div>

<label>Location Zone</label>
<input type="text" id="location_zone">

</fieldset>

<!-- SECTION B -->
<fieldset>
<legend>Section B: Waste Experience</legend>

<label>Waste Frequency</label>
<div class="group">
<label><input type="radio" name="freq" value="Daily"> Daily</label>
<label><input type="radio" name="freq" value="Weekly"> Weekly</label>
<label><input type="radio" name="freq" value="Bi-weekly"> Bi-weekly</label>
<label><input type="radio" name="freq" value="Rarely"> Rarely</label>
</div>

<label>Satisfaction Level</label>
<div class="group">
<label><input type="radio" name="sat" value="Very Satisfied"> Very Satisfied</label>
<label><input type="radio" name="sat" value="Satisfied"> Satisfied</label>
<label><input type="radio" name="sat" value="Neutral"> Neutral</label>
<label><input type="radio" name="sat" value="Unsatisfied"> Unsatisfied</label>
</div>

<label>Challenges</label>
<div class="group">
<label><input type="checkbox" id="delayed_collection"> Delayed collection</label>
<label><input type="checkbox" id="poor_communication"> Poor communication</label>
<label><input type="checkbox" id="missed_pickups"> Missed pickups</label>
<label><input type="checkbox" id="high_cost"> High cost</label>
</div>

<label>Other Challenge</label>
<input type="text" id="other_challenge">

</fieldset>

<!-- SECTION C -->
<fieldset>
<legend>Section C: Technology Use</legend>

<label>Smartphone?</label>
<div class="group">
<label><input type="radio" name="smartphone" value="Yes"> Yes</label>
<label><input type="radio" name="smartphone" value="No"> No</label>
</div>

<label>App Comfort</label>
<div class="group">
<label><input type="radio" name="app" value="Yes"> Yes</label>
<label><input type="radio" name="app" value="Somewhat"> Somewhat</label>
<label><input type="radio" name="app" value="No"> No</label>
</div>

<label>Would you like a Digital System?</label>
<div class="group">
<label><input type="radio" name="digital" value="Yes"> Yes</label>
<label><input type="radio" name="digital" value="Maybe"> Maybe</label>
<label><input type="radio" name="digital" value="No"> No</label>
</div>

</fieldset>

<!-- SECTION D -->
<fieldset>
<legend>Section D: Feedback</legend>

<label>Features</label>
<div class="group">
<label><input type="checkbox" id="feature_requests"> Requests</label>
<label><input type="checkbox" id="feature_monitoring"> Monitoring</label>
</div>

<label>Comments</label>
<textarea id="comments"></textarea>

</fieldset>

<button type="submit">Submit Feedback</button>

</form>

</div>

<script>
const API = "https://m-wastesystem.onrender.com/api/customer-feedback";

function popup(msg){
    const p = document.getElementById("popup");
    p.innerText = msg;
    p.style.display = "block";
    setTimeout(()=> p.style.display="none", 2500);
}

document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        collection_date: document.getElementById("collection_date").value,
        respondent_category: document.querySelector('input[name="cat"]:checked')?.value,
        gender: document.querySelector('input[name="gender"]:checked')?.value,
        age_range: document.querySelector('input[name="age"]:checked')?.value,
        location_zone: document.getElementById("location_zone").value,

        waste_frequency: document.querySelector('input[name="freq"]:checked')?.value,
        satisfaction_level: document.querySelector('input[name="sat"]:checked')?.value,

        delayed_collection: document.getElementById("delayed_collection").checked ? 1 : 0,
        poor_communication: document.getElementById("poor_communication").checked ? 1 : 0,
        missed_pickups: document.getElementById("missed_pickups").checked ? 1 : 0,
        high_cost: document.getElementById("high_cost").checked ? 1 : 0,

        other_challenge: document.getElementById("other_challenge").value,

        has_smartphone: document.querySelector('input[name="smartphone"]:checked')?.value,
        app_comfort: document.querySelector('input[name="app"]:checked')?.value,
        willing_digital_system: document.querySelector('input[name="digital"]:checked')?.value,

        feature_requests: document.getElementById("feature_requests").checked ? 1 : 0,
        feature_monitoring: document.getElementById("feature_monitoring").checked ? 1 : 0,

        comments: document.getElementById("comments").value
    };

    try {
        const res = await fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
            popup("Feedback submitted successfully");
            e.target.reset();
        } else {
            popup(result.message || "Failed");
        }

    } catch (err) {
        popup("Server not reachable");
    }
});
</script>


<nav>
    <a href="index.html">Home</a>
   
</body>
</html>
