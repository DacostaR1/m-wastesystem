<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Login</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#0a8754,#0f5f3c);
}


#popup{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    color:#0a8754;
    padding:12px 20px;
    border-radius:8px;
    display:none;
    font-weight:bold;
    z-index:9999;
}


.container{

    width:90%;
    max-width:420px;
    margin:70px auto;
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);

}


h2{
    text-align:center;
    color:#0a8754;
}


.info{

    background:#e6f7ee;
    padding:12px;
    border-left:5px solid #0a8754;
    border-radius:6px;
    color:#333;
    font-size:14px;
    margin-bottom:20px;

}


label{

    font-weight:bold;
}


input{

    width:100%;
    padding:12px;
    margin:8px 0 15px;
    border:1px solid #ccc;
    border-radius:6px;

}


input:focus{

    outline:none;
    border-color:#0a8754;

}


button{

    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#0a8754;
    color:white;
    font-size:16px;
    cursor:pointer;

}


button:hover{

    background:#076b42;

}


nav{

    text-align:center;
    margin-top:15px;

}


nav a{

    color:#0a8754;
    text-decoration:none;
    font-weight:bold;

}

</style>

</head>


<body>


<div id="popup"></div>


<div class="container">


<h2>Staff Login</h2>


<p class="info">

Administrators and Waste Collectors can login using their assigned username and password.

</p>



<form id="loginForm">


<label>Username</label>

<input 
type="text" 
id="username"
required
>



<label>Password</label>

<input 
type="password" 
id="password"
required
>



<button type="submit">
Login
</button>


</form>


<nav>

<a href="index.html">
Home
</a>

</nav>


</div>




<script>


function popup(message){

    const box=document.getElementById("popup");

    box.innerText=message;

    box.style.display="block";


    setTimeout(()=>{

        box.style.display="none";

    },2500);

}




const form=document.getElementById("loginForm");



form.addEventListener("submit", async(e)=>{


e.preventDefault();



const username=
document.getElementById("username").value.trim();



const password=
document.getElementById("password").value;



try{


const response = await fetch("/api/login",{

    method:"POST",

    headers:{
        "Content-Type":"application/json"
    },

    body:JSON.stringify({

        username:username,

        password:password

    })

});



const data=await response.json();



if(!response.ok){

    popup(data.message || "Login failed");

    return;

}




// Save complete user session

sessionStorage.setItem(
    "loggedUser",
    JSON.stringify(data.user)
);


sessionStorage.setItem(
    "userRole",
    data.role
);



// Save collector identity

if(data.role === "collector"){


    sessionStorage.setItem(
        "collector_name",
        data.user.full_name
    );


    sessionStorage.setItem(
        "collector_id",
        data.user.id
    );


}



popup("Login successful");



setTimeout(()=>{


if(data.role === "admin"){


    window.location.href="admin-Dashboard.html";


}

else if(data.role === "collector"){


    window.location.href="collector-dashboard.html";


}

else{


    popup("Unknown user role");


}


},1000);




}catch(error){


console.error(error);

popup("Server not reachable");


}



});



</script>


</body>

</html>
