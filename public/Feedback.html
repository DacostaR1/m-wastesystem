<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waste Management Data Collection Form</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a8754, #0f5f3c);
}

/* Container (same as login card) */
.container {
    width: 100%;
    max-width: 850px;
    margin: 40px auto;
    background: rgba(255, 255, 255, 0.95);
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    backdrop-filter: blur(6px);
}

/* Headings */
h2 {
    text-align: center;
    color: #0a8754;
    margin-bottom: 10px;
}

h3 {
    color: #0a8754;
    margin-top: 20px;
}

/* Section box */
fieldset {
    border: 2px solid #0a8754;
    border-radius: 10px;
    margin-bottom: 20px;
    padding: 15px;
}

legend {
    color: #0a8754;
    font-weight: bold;
    padding: 0 8px;
}

/* Inputs */
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0 12px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
}

input:focus, textarea:focus {
    border-color: #0a8754;
    box-shadow: 0 0 5px rgba(10,135,84,0.4);
}

/* Options layout */
.options {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 10px;
}

.options label {
    background: #e6f7ee;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #0a8754;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #076b42;
}

/* Popup (same style as login) */
#popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ffffff;
    color: #0a8754;
    padding: 12px 20px;
    border-radius: 8px;
    display: none;
    z-index: 9999;
    font-weight: bold;
}

/* Responsive */
@media(max-width: 768px){
    .options{
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div id="popup"></div>

<div class="container">

<h2>WASTE MANAGEMENT SYSTEM</h2>
<p style="text-align:center;color:#444;">Data Collection Form</p>

<form>

<!-- SECTION A -->
<fieldset>
<legend>Section A: Respondent Information</legend>

<label>Date</label>
<input type="date">

<label>Respondent Category</label>
<div class="options">
<label><input type="radio" name="cat"> Resident</label>
<label><input type="radio" name="cat"> Waste Officer</label>
<label><input type="radio" name="cat"> Administrator</label>
</div>

<label>Gender</label>
<div class="options">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
<label><input type="radio" name="gender"> Other</label>
</div>

<label>Age Range</label>
<div class="options">
<label><input type="radio" name="age"> 18–25</label>
<label><input type="radio" name="age"> 26–35</label>
<label><input type="radio" name="age"> 36–45</label>
<label><input type="radio" name="age"> 46+</label>
</div>

<label>Location / Zone</label>
<input type="text" placeholder="Enter your location">

</fieldset>

<!-- SECTION B -->
<fieldset>
<legend>Section B: Waste Experience</legend>

<label>How often is waste collected?</label>
<div class="options">
<label><input type="radio" name="freq"> Daily</label>
<label><input type="radio" name="freq"> Weekly</label>
<label><input type="radio" name="freq"> Bi-weekly</label>
<label><input type="radio" name="freq"> Rarely</label>
</div>

<label>Satisfaction Level</label>
<div class="options">
<label><input type="radio" name="sat"> Very Satisfied</label>
<label><input type="radio" name="sat"> Satisfied</label>
<label><input type="radio" name="sat"> Neutral</label>
<label><input type="radio" name="sat"> Unsatisfied</label>
</div>

<label>Challenges Faced</label>
<div class="options">
<label><input type="checkbox"> Delayed collection</label>
<label><input type="checkbox"> Poor communication</label>
<label><input type="checkbox"> Missed pickups</label>
<label><input type="checkbox"> High cost</label>
</div>

<label>Other</label>
<input type="text" placeholder="Specify">

</fieldset>

<!-- SECTION C -->
<fieldset>
<legend>Section C: Technology Use</legend>

<label>Do you use a smartphone?</label>
<div class="options">
<label><input type="radio" name="phone"> Yes</label>
<label><input type="radio" name="phone"> No</label>
</div>

<label>Comfort using apps?</label>
<div class="options">
<label><input type="radio" name="app"> Yes</label>
<label><input type="radio" name="app"> Somewhat</label>
<label><input type="radio" name="app"> No</label>
</div>

<label>Willing to use digital system?</label>
<div class="options">
<label><input type="radio" name="digital"> Yes</label>
<label><input type="radio" name="digital"> Maybe</label>
<label><input type="radio" name="digital"> No</label>
</div>

</fieldset>

<!-- SECTION D -->
<fieldset>
<legend>Section D: Feedback</legend>

<label>Useful Features</label>
<div class="options">
<label><input type="checkbox"> Requests</label>
<label><input type="checkbox"> Monitoring</label>

</div>

<label>Comments</label>
<textarea rows="4" placeholder="Write your suggestions..."></textarea>

</fieldset>

<button type="submit">Submit Form</button>

</form>

</div>

</body>
</html>
