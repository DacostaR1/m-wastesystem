<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waste Management Data Collection Form</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a8754, #0f5f3c);
}

.container {
    width: 100%;
    max-width: 850px;
    margin: 40px auto;
    background: rgba(255, 255, 255, 0.95);
    padding: 25px;
    border-radius: 14px;
}

h2 {
    text-align: center;
    color: #0a8754;
}

fieldset {
    border: 2px solid #0a8754;
    margin-bottom: 20px;
    padding: 15px;
}

.options label {
    margin-right: 10px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 6px;
}

button {
    width: 100%;
    padding: 12px;
    background: #0a8754;
    color: white;
    border: none;
    cursor: pointer;
}

#popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    color: #0a8754;
    padding: 10px;
    display: none;
}
</style>
</head>

<body>

<div id="popup"></div>

<div class="container">
<h2>Waste Management System</h2>

<form id="feedbackForm">

<!-- SECTION A -->
<fieldset>
<legend>Section A</legend>

<label>Date</label>
<input type="date" id="date">

<label>Category</label>
<div class="options">
<label><input type="radio" name="cat" value="Resident"> Resident</label>
<label><input type="radio" name="cat" value="Waste Officer"> Waste Officer</label>
<label><input type="radio" name="cat" value="Administrator"> Administrator</label>
</div>

<label>Gender</label>
<div class="options">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<label>Age</label>
<div class="options">
<label><input type="radio" name="age" value="18-25"> 18–25</label>
<label><input type="radio" name="age" value="26-35"> 26–35</label>
<label><input type="radio" name="age" value="36-45"> 36–45</label>
<label><input type="radio" name="age" value="46+"> 46+</label>
</div>

<input type="text" id="location" placeholder="Location">
</fieldset>

<!-- SECTION B -->
<fieldset>
<legend>Section B</legend>

<div class="options">
<label><input type="radio" name="freq" value="Daily"> Daily</label>
<label><input type="radio" name="freq" value="Weekly"> Weekly</label>
<label><input type="radio" name="freq" value="Bi-weekly"> Bi-weekly</label>
<label><input type="radio" name="freq" value="Rarely"> Rarely</label>
</div>

<div class="options">
<label><input type="radio" name="sat" value="Very Satisfied"> Very Satisfied</label>
<label><input type="radio" name="sat" value="Satisfied"> Satisfied</label>
<label><input type="radio" name="sat" value="Neutral"> Neutral</label>
<label><input type="radio" name="sat" value="Unsatisfied"> Unsatisfied</label>
</div>

<label><input type="checkbox" id="delayed"> Delayed collection</label>
<label><input type="checkbox" id="poor"> Poor communication</label>
<label><input type="checkbox" id="missed"> Missed pickups</label>
<label><input type="checkbox" id="cost"> High cost</label>

<input type="text" id="other" placeholder="Other">
</fieldset>

<!-- SECTION C -->
<fieldset>
<legend>Section C</legend>

<label>Smartphone?</label>
<input type="radio" name="phone" value="Yes"> Yes
<input type="radio" name="phone" value="No"> No

<label>App comfort</label>
<input type="radio" name="app" value="Yes"> Yes
<input type="radio" name="app" value="Somewhat"> Somewhat
<input type="radio" name="app" value="No"> No

<label>Digital system?</label>
<input type="radio" name="digital" value="Yes"> Yes
<input type="radio" name="digital" value="Maybe"> Maybe
<input type="radio" name="digital" value="No"> No
</fieldset>

<!-- SECTION D -->
<fieldset>
<legend>Section D</legend>

<label><input type="checkbox" id="req"> Requests</label>
<label><input type="checkbox" id="mon"> Monitoring</label>

<textarea id="comments" placeholder="Comments"></textarea>
</fieldset>

<button type="submit">Submit</button>

</form>
</div>

<script>
function popup(msg){
    const p = document.getElementById("popup");
    p.innerText = msg;
    p.style.display = "block";
    setTimeout(()=> p.style.display="none", 2000);
}

document.getElementById("feedbackForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const data = {
        collection_date: document.getElementById("date").value,
        cat: document.querySelector('input[name="cat"]:checked')?.value,
        gender: document.querySelector('input[name="gender"]:checked')?.value,
        age: document.querySelector('input[name="age"]:checked')?.value,
        location: document.getElementById("location").value,

        freq: document.querySelector('input[name="freq"]:checked')?.value,
        sat: document.querySelector('input[name="sat"]:checked')?.value,

        delayed_collection: document.getElementById("delayed").checked,
        poor_communication: document.getElementById("poor").checked,
        missed_pickups: document.getElementById("missed").checked,
        high_cost: document.getElementById("cost").checked,

        other_challenge: document.getElementById("other").value,

        phone: document.querySelector('input[name="phone"]:checked')?.value,
        app: document.querySelector('input[name="app"]:checked')?.value,
        digital: document.querySelector('input[name="digital"]:checked')?.value,

        requests: document.getElementById("req").checked,
        monitoring: document.getElementById("mon").checked,

        comments: document.getElementById("comments").value
    };

    const res = await fetch("https://m-wastesystem.onrender.com/api/customer-feedback", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if(res.ok){
        popup("Feedback submitted successfully");
        e.target.reset();
    } else {
        popup(result.message || "Failed to submit feedback");
    }
});
</script>

</body>
</html>
