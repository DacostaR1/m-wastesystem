<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Waste Admin Dashboard</title>

<style>

/* =====================
RESET
===================== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
display:flex;
min-height:100vh;
background:#f4f6f9;
}

/* =====================
SIDEBAR
===================== */
.sidebar{
width:240px;
background:#0b8457;
color:white;
padding:20px;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
border-radius:6px;
margin-bottom:8px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

/* =====================
MAIN CONTENT
===================== */
.main{
flex:1;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h1{
font-size:22px;
}

/* =====================
CARDS GRID
===================== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
gap:15px;
}

/* =====================
CARD
===================== */
.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card p{
margin:6px 0;
font-size:14px;
}

/* STATUS */
.status{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:white;
}

.pending{background:#f0ad4e;}
.approved{background:#28a745;}
.assigned{background:#007bff;}

/* BUTTONS */
.actions{
margin-top:10px;
display:flex;
gap:8px;
}

button{
flex:1;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.approve{background:#28a745;color:white;}
.assign{background:#007bff;color:white;}

button:hover{
opacity:0.85;
}

/* =====================
MOBILE
===================== */
@media(max-width:768px){

.sidebar{
display:none;
}

body{
flex-direction:column;
}

.header h1{
font-size:18px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">
<h2>Waste Admin</h2>
<a href="#">Dashboard</a>
<a href="#">Requests</a>
<a href="#">Trucks</a>
<a href="#">Logout</a>
</div>

<!-- MAIN -->

<div class="main">

<div class="header">
<h1>Waste Collection Requests</h1>
</div>

<div class="grid" id="requestGrid">
Loading requests...
</div>

</div>

<script>

async function loadRequests(){

const container =
document.getElementById("requestGrid");

try{

const res =
await fetch("/api/requests");

const data =
await res.json();

container.innerHTML="";

if(data.length===0){
container.innerHTML="No requests found";
return;
}

data.forEach(r=>{

let statusClass =
r.status==="Approved" ? "approved" :
r.status==="Assigned" ? "assigned" : "pending";

container.innerHTML+=`

<div class="card">

<p><b>Name:</b> ${r.name}</p>
<p><b>Location:</b> ${r.location}</p>
<p><b>Waste:</b> ${r.wasteType}</p>

<p>
<span class="status ${statusClass}">
${r.status || "Pending"}
</span>
</p>

<p><b>Truck:</b> ${r.assigned_truck || "-"}</p>

<div class="actions">

<button class="approve"
onclick="approveRequest(${r.id})">
Approve
</button>

<button class="assign"
onclick="assignTruck(${r.id})">
Assign
</button>

</div>

</div>

`;

});

}catch(err){
container.innerHTML="Failed to load requests";
}

}

async function approveRequest(id){
await fetch(`/api/requests/approve/${id}`, {method:"PUT"});
loadRequests();
}

async function assignTruck(id){

const truck = prompt("Enter truck number:");
if(!truck) return;

await fetch(`/api/requests/assign/${id}`, {
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({truck})
});

loadRequests();
}

window.onload = loadRequests;

</script>

</body>
</html>
