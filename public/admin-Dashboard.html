<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Waste Admin Dashboard</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f9;
}

/* LAYOUT */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

.box{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
border-left:5px solid #0b8457;
}

.card p{
margin:6px 0;
font-size:14px;
}

/* STATUS */
.status{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:white;
}

.pending{background:#f0ad4e;}
.approved{background:#28a745;}
.rejected{background:#dc3545;}
.assigned{background:#007bff;}

/* BUTTONS */
.actions{
display:flex;
gap:8px;
margin-top:10px;
flex-wrap:wrap;
}

button{
flex:1;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.approve{background:#28a745;color:white;}
.reject{background:#dc3545;color:white;}
.assign{background:#007bff;color:white;}

button:hover{
opacity:0.85;
}

/* MOBILE */
@media(max-width:768px){

.stats{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<div class="container">

<h2>Waste Management Admin Dashboard</h2>

<!-- STATS -->
<div id="stats" class="stats"></div>

<!-- REQUEST GRID -->
<div id="grid" class="grid">Loading...</div>

</div>

<script>

// =====================
// LOAD STATS
// =====================
async function loadStats(){

const res = await fetch("/api/requests");
const data = await res.json();

let pending = data.filter(r => (r.status||"").toLowerCase()==="pending").length;
let approved = data.filter(r => (r.status||"").toLowerCase()==="approved").length;
let rejected = data.filter(r => (r.status||"").toLowerCase()==="rejected").length;
let assigned = data.filter(r => r.assigned_truck).length;

document.getElementById("stats").innerHTML = `
<div class="box">Pending: ${pending}</div>
<div class="box">Approved: ${approved}</div>
<div class="box">Rejected: ${rejected}</div>
<div class="box">Assigned: ${assigned}</div>
`;
}

// =====================
// LOAD REQUESTS
// =====================
async function loadRequests(){

const grid = document.getElementById("grid");

try{

const res = await fetch("/api/requests");
const data = await res.json();

grid.innerHTML = "";

if(!data.length){
grid.innerHTML = "No requests found";
return;
}

data.forEach(r => {

let status = (r.status || "Pending").toLowerCase();

let statusClass =
status === "approved" ? "approved" :
status === "rejected" ? "rejected" :
status === "assigned" ? "assigned" : "pending";

grid.innerHTML += `
<div class="card">

<p><b>Name:</b> ${r.name}</p>
<p><b>Location:</b> ${r.location}</p>
<p><b>Phone:</b> ${r.phone}</p>
<p><b>Email:</b> ${r.email}</p>
<p><b>Waste Type:</b> ${r.wasteType}</p>
<p><b>Additional Info:</b> ${r.additionalInfo || "-"}</p>

<p>
<span class="status ${statusClass}">
${r.status || "Pending"}
</span>
</p>

<p><b>Truck:</b> ${r.assigned_truck || "-"}</p>

<p><b>Action By:</b> ${r.action_by || "-"}</p>
<p><b>Remarks:</b> ${r.remarks || "-"}</p>
<p><b>Rejection Reason:</b> ${r.rejection_reason || "-"}</p>

<div class="actions">

<button class="approve"
onclick="approveRequest(${r.id})">
Approve
</button>

<button class="reject"
onclick="rejectRequest(${r.id})">
Reject
</button>

<button class="assign"
onclick="assignTruck(${r.id})">
Assign
</button>

</div>

</div>
`;
});

}catch(err){
grid.innerHTML = "Failed to load requests";
}

}

// =====================
// APPROVE
// =====================
async function approveRequest(id){

await fetch(`/api/requests/approve/${id}`, {
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
admin:"Admin",
remarks:"Approved via dashboard"
})
});

loadRequests();
loadStats();
}

// =====================
// REJECT
// =====================
async function rejectRequest(id){

let reason = prompt("Enter rejection reason:");
if(!reason) return;

await fetch(`/api/requests/reject/${id}`, {
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
reason,
admin:"Admin"
})
});

loadRequests();
loadStats();
}

// =====================
// ASSIGN TRUCK
// =====================
async function assignTruck(id){

let truck = prompt("Enter truck number:");
if(!truck) return;

await fetch(`/api/requests/assign/${id}`, {
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({truck})
});

loadRequests();
loadStats();
}

// INIT
window.onload = () => {
loadRequests();
loadStats();
};

</script>

</body>
</html>
