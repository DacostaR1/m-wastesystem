<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Feedback Form</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a8754, #0f5f3c);
}

/* Container */
.container {
    width: 100%;
    max-width: 550px;
    margin: 60px auto;
    background: rgba(255, 255, 255, 0.95);
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Heading */
h2 {
    text-align: center;
    color: #0a8754;
    margin-bottom: 20px;
}

/* Inputs */
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
}

input:focus, textarea:focus, select:focus {
    border-color: #0a8754;
    box-shadow: 0 0 5px rgba(10,135,84,0.4);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #0a8754;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #076b42;
}

/* Popup */
#popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ffffff;
    color: #0a8754;
    padding: 12px 18px;
    border-radius: 8px;
    display: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="popup"></div>

<div class="container">

<h2>Staff Feedback Form</h2>

<form id="staffForm">

<label>Full Name</label>
<input type="text" id="full_name" required>

<label>Role</label>
<select id="role" required>
    <option value="">Select Role</option>
    <option>Admin</option>
    <option>Waste Officer</option>
    <option>Supervisor</option>
    <option>Customer Care Officer</option>
    <option>Technician</option>
    <option>Driver</option>
    <option>Other</option>
</select>

<label>Email</label>
<input type="email" id="email">

<label>Phone Number</label>
<input type="text" id="phone" required>

<label>Department</label>
<select id="department">
    <option>Waste Management</option>
    <option>IT Support</option>
    <option>Operations</option>
    <option>Customer Service</option>
    <option>Administration</option>
</select>

<label>Work Address</label>
<input type="text" id="work_location" required>

<label>Comments</label>
<textarea rows="4" id="comments" placeholder="Kindly share your honest feedback..." required></textarea>

<button type="submit">Submit Feedback</button>

</form>

</div>

<script>

const API_URL = "https://m-wastesystem.onrender.com";

function popup(msg, isError = false) {
    const p = document.getElementById("popup");
    p.innerText = msg;
    p.style.background = isError ? "#ffdddd" : "#ffffff";
    p.style.color = isError ? "#b00020" : "#0a8754";
    p.style.display = "block";

    setTimeout(() => {
        p.style.display = "none";
    }, 2500);
}

document.getElementById("staffForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        full_name: document.getElementById("full_name").value,
        role: document.getElementById("role").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        department: document.getElementById("department").value,
        work_location: document.getElementById("work_location").value,
        comments: document.getElementById("comments").value
    };

    try {
        const res = await fetch(`${API_URL}/api/staff-feedback`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (!res.ok) {
            popup(result.message || "Submission failed", true);
            return;
        }

        popup("Your Feedback is submitted successfully");

        this.reset();

    } catch (err) {
        console.error(err);
        popup("Server not reachable ", true);
    }
});


</script>

</body>
</html>
